<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Title - Case Study</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
        }

        /* Navigation */
        nav {
            background: #063f0d;
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        nav a {
            text-decoration: none;
            color: #f5fff7;
            font-weight: 500;
            transition: color 0.3s;
        }
        nav a:hover { color: #a8d5b5; }
        .nav-toggle {
            display: none;
            background: none;
            border: none;
            color: #f5fff7;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        @media (max-width: 768px) {
            nav {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0.75rem 1.25rem;
            }
            .nav-toggle { display: block; }
            nav ul {
                display: none;
                flex-direction: column;
                text-align: center;
                gap: 0;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: #063f0d;
                padding: 0.5rem 0 1rem;
                box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            }
            nav ul.open { display: flex; }
            nav ul li a {
                display: block;
                padding: 0.6rem 1rem;
            }
        }

        /* Case Study Content */
        .case-study {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        .case-study-header {
            margin: 3rem 0;
            text-align: center;
        }

        .case-study-header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .project-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
            padding: 2rem;
            background: #f3f4f6;
            border-radius: 8px;
        }

        .detail-item h3 {
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .project-content {
            margin: 3rem 0;
        }

        .project-content section {
            margin-bottom: 3rem;
        }

        .project-content h2 {
            margin-bottom: 1rem;
        }

        .project-content p {
            margin-bottom: 1rem;
        }

        .project-image {
            width: 100%;
            height: auto;
            margin: 2rem 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .next-prev {
            display: flex;
            justify-content: space-between;
            margin: 4rem 0;
            padding-top: 2rem;
            border-top: 1px solid #eee;
        }

        .next-prev a {
            text-decoration: none;
            color: #007bff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Responsive Images */
        img {
            max-width: 100%;
            height: auto;
        }

        @media (max-width: 768px) {
            .case-study-header h1 {
                font-size: 2rem;
            }

            .project-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
        <ul id="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="../index.html#work">Work</a></li>
            <li><a href="../index.html#about">About</a></li>
            <li><a href="../resources.html">Resources</a></li>
            <li><a href="../index.html#contact">Contact</a></li>
        </ul>
    </nav>

    <article class="case-study">
        <header class="case-study-header">
            <h1>Senior Design Challenge: Building Community and Fostering Hope with COVER Home Repair</h1>
            <p>This page is a work in progress - please check back later!</p>
        </header>

    <div class="back-link">
      <a href="../index.html">← Back to Portfolio</a>
    </div>

  </div>

  <script>
    document.getElementById("nav-toggle").addEventListener("click", () => {
      document.getElementById("nav-links").classList.toggle("open");
    });
  </script>
  
</body>
</html>
